<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    #test-wrapper {
      margin: 0 auto;
      width: 100vw;
      height: 100vh;
      opacity: 0.3;
      overflow: hidden;
    }

    .content {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(100, 100, 100, .1);
    }

    #btn-load {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>
  <div id="test-wrapper"></div>

  <button id="btn-load">加载</button>
</body>
<script src="./index.js"></script>
<script>
  let wfl = new Waterfall({
    container: {
      id: '#test-wrapper',
      width: 414,
      height: 500
    },
    column: 2,
    lazy: true,
    resize: true
  })


  let n = 0;
  function append() {
    for (let i = 1; i <= 8; i++) {
      wfl.append(
        `<div class="content" style="height: ${Math.ceil(Math.random() * 170 + 70)}px;">${n}</div>`
      )
      n += 1;
    }
  }
  append()
  document.getElementById('btn-load').onclick = function () {
    append()
  }
</script>

</html>
